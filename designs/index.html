<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pattern — the chess trainer that knows your games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,300;1,6..72,400&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    /* Editorial palette (default) */
    --bg:        #f5f2ec;
    --bg-2:      #efebe2;
    --ink:       #1a1a1a;
    --ink-2:     #3a3a36;
    --muted:     #6b6860;
    --line:      rgba(26,26,26,0.12);
    --line-2:    rgba(26,26,26,0.06);
    --walnut:    #8b6f47;
    --amber:     #d4a574;
    --good:      #4f6b4a;
    --bad:       #a64a3f;

    /* Board colors */
    --sq-light:  #e8dcc2;
    --sq-dark:   #a07a4d;
    --sq-hint:   rgba(212,165,116,0.55);
    --sq-good:   rgba(79,107,74,0.55);
    --sq-bad:    rgba(166,74,63,0.55);

    --serif: "Newsreader", "Times New Roman", serif;
    --sans:  "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --mono:  "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;

    --pad: 32px;
    --radius: 2px;
  }

  [data-theme="mono"] {
    --bg:       #fafaf9;
    --bg-2:     #f2f1ee;
    --ink:      #0f0f0f;
    --ink-2:    #2a2a2a;
    --muted:    #6a6a68;
    --line:     rgba(15,15,15,0.14);
    --line-2:   rgba(15,15,15,0.06);
    --walnut:   #3a3a3a;
    --amber:    #7b7b77;
    --sq-light: #eeede9;
    --sq-dark:  #2a2a28;
    --serif: "JetBrains Mono", ui-monospace, monospace;
    --sans:  "JetBrains Mono", ui-monospace, monospace;
  }

  [data-theme="walnut"] {
    --bg:        #ede4d2;
    --bg-2:      #e2d7c0;
    --ink:       #2a1e12;
    --ink-2:     #3e2f1f;
    --muted:     #6b5a44;
    --line:      rgba(42,30,18,0.16);
    --line-2:    rgba(42,30,18,0.08);
    --walnut:    #5b3e22;
    --amber:     #c68a3f;
    --sq-light:  #e8d3a8;
    --sq-dark:   #7a4b25;
  }

  [data-density="compact"] { --pad: 20px; }

  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 15px; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; }
  a { color: inherit; }

  .serif { font-family: var(--serif); font-weight: 400; letter-spacing: -0.01em; }
  .mono  { font-family: var(--mono); font-size: 12px; letter-spacing: 0.02em; }

  button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; padding: 0; }
  input, textarea { font-family: inherit; color: inherit; }

  ::selection { background: var(--amber); color: var(--ink); }

  /* paper grain */
  .paper::before {
    content: "";
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(rgba(26,26,26,0.025) 1px, transparent 1px),
      radial-gradient(rgba(26,26,26,0.015) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
    opacity: .6;
  }

  /* kbd */
  .kbd {
    font-family: var(--mono);
    font-size: 10px; padding: 2px 5px;
    border: 1px solid var(--line); border-bottom-width: 2px;
    border-radius: 3px; background: var(--bg-2);
  }

  /* scrollbar subtle */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body class="paper">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/data.jsx"></script>
  <script type="text/babel" src="src/chess.jsx"></script>
  <script type="text/babel" src="src/board.jsx"></script>
  <script type="text/babel" src="src/ui.jsx"></script>
  <script type="text/babel" src="src/screens/landing.jsx"></script>
  <script type="text/babel" src="src/screens/auth.jsx"></script>
  <script type="text/babel" src="src/screens/onboarding.jsx"></script>
  <script type="text/babel" src="src/screens/dashboard.jsx"></script>
  <script type="text/babel" src="src/screens/review.jsx"></script>
  <script type="text/babel" src="src/screens/deck.jsx"></script>
  <script type="text/babel" src="src/screens/sync.jsx"></script>
  <script type="text/babel" src="src/tweaks.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
